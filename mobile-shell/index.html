<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NiiRo Smart Wedding</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fffcf7;
        --surface: rgba(255, 255, 255, 0.92);
        --border: rgba(21, 24, 28, 0.08);
        --text: #282c31;
        --muted: #6b7280;
        --gold: #d49a1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top))
          max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(24px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at top, rgba(212, 154, 29, 0.18), transparent 32%),
          linear-gradient(180deg, #fffaf1 0%, var(--bg) 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: 0 20px 60px rgba(21, 24, 28, 0.08);
        text-align: center;
      }

      .spinner {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 50%;
        border: 4px solid rgba(212, 154, 29, 0.18);
        border-top-color: var(--gold);
        animation: spin 1s linear infinite;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="spinner" aria-hidden="true"></div>
      <h1>NiiRo Smart Wedding</h1>
      <p>Die mobile App verbindet sich mit eurer gehosteten Hochzeitsoberflaeche.</p>
    </main>
  </body>
</html>
