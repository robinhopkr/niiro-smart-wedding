name: Mobile iOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'mobile-v*'

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive iOS version metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          if [[ "$TAG_NAME" == mobile-v* ]]; then
            VERSION_NAME="${TAG_NAME#mobile-v}"
          else
            VERSION_NAME="1.0.0"
          fi
          BUILD_NUMBER=$(( GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT ))
          echo "IOS_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Resolve iOS export method
        env:
          IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          DEFAULT_EXPORT_METHOD="ad-hoc"
          if [[ "$GITHUB_REF" == refs/tags/mobile-v* ]]; then
            DEFAULT_EXPORT_METHOD="app-store"
          fi
          echo "IOS_EXPORT_METHOD_RESOLVED=${IOS_EXPORT_METHOD:-$DEFAULT_EXPORT_METHOD}" >> "$GITHUB_ENV"

      - name: Sync Capacitor assets
        env:
          CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL || 'https://smartwedding.niiro.ai' }}
        run: npm run mobile:sync

      - name: Fail fast if iOS signing secrets are missing
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          test -n "$IOS_CERTIFICATE_P12_BASE64" || (echo "Missing IOS_CERTIFICATE_P12_BASE64" && exit 1)
          test -n "$IOS_CERTIFICATE_PASSWORD" || (echo "Missing IOS_CERTIFICATE_PASSWORD" && exit 1)
          test -n "$IOS_PROVISIONING_PROFILE_BASE64" || (echo "Missing IOS_PROVISIONING_PROFILE_BASE64" && exit 1)
          test -n "$IOS_KEYCHAIN_PASSWORD" || (echo "Missing IOS_KEYCHAIN_PASSWORD" && exit 1)

      - name: Import signing certificate and provisioning profile
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Create export options
        env:
          IOS_EXPORT_METHOD_RESOLVED: ${{ env.IOS_EXPORT_METHOD_RESOLVED }}
        run: |
          cat <<EOF > ios/App/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD_RESOLVED}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Build and export IPA
        env:
          IOS_VERSION_NAME: ${{ env.IOS_VERSION_NAME }}
          IOS_BUILD_NUMBER: ${{ env.IOS_BUILD_NUMBER }}
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -destination generic/platform=iOS -archivePath build/App.xcarchive MARKETING_VERSION="$IOS_VERSION_NAME" CURRENT_PROJECT_VERSION="$IOS_BUILD_NUMBER" clean archive
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportPath build/export -exportOptionsPlist ExportOptions.plist

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: niiro-smart-wedding-ios
          path: |
            ios/App/build/App.xcarchive
            ios/App/build/export/*.ipa

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          IPA_FILE=$(find ios/App/build/export -name "*.ipa" | head -n 1)
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --generate-notes --title "$TAG_NAME"
          gh release upload "$TAG_NAME" "$IPA_FILE#niiro-smart-wedding.ipa" --clobber

      - name: Validate App Store Connect upload config
        if: env.IOS_EXPORT_METHOD_RESOLVED == 'app-store'
        env:
          APP_STORE_CONNECT_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD: ${{ secrets.APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for secret_name in APP_STORE_CONNECT_USERNAME APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error title=Missing App Store Connect upload secret::$secret_name is required for App Store / TestFlight uploads."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Upload IPA to App Store Connect
        if: env.IOS_EXPORT_METHOD_RESOLVED == 'app-store'
        env:
          APP_STORE_CONNECT_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD: ${{ secrets.APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD }}
        run: |
          IPA_FILE=$(find ios/App/build/export -name "*.ipa" | head -n 1)
          xcrun altool --upload-app --type ios --file "$IPA_FILE" --username "$APP_STORE_CONNECT_USERNAME" --password "$APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD"
