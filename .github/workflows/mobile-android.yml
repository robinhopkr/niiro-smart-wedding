name: Mobile Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'mobile-v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Derive mobile version metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$TAG_NAME" == mobile-v* ]]; then
            VERSION_NAME="${TAG_NAME#mobile-v}"
          else
            VERSION_NAME="1.0.0"
          fi
          VERSION_CODE=$(VERSION_NAME="$VERSION_NAME" python - <<'PY'
          import os

          version = os.environ["VERSION_NAME"]
          parts = [int(part) for part in version.split(".")]
          while len(parts) < 3:
              parts.append(0)

          print(parts[0] * 10000 + parts[1] * 100 + parts[2])
          PY
          )
          echo "ANDROID_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Sync Capacitor assets
        env:
          CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL || 'https://smartwedding.niiro.ai' }}
        run: npm run mobile:sync

      - name: Validate release signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error title=Missing Android signing secret::$secret_name is required for signed release builds."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Build signed release APK and AAB
        env:
          ANDROID_KEYSTORE_PATH: release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
          ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: niiro-smart-wedding-android-release
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --generate-notes --title "$TAG_NAME"
          gh release upload "$TAG_NAME" android/app/build/outputs/apk/release/app-release.apk#niiro-smart-wedding-release.apk --clobber
          gh release upload "$TAG_NAME" android/app/build/outputs/bundle/release/app-release.aab#niiro-smart-wedding-release.aab --clobber
